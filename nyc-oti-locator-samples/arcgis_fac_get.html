<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>ArcGIS WGS FAC GET</title>
    <style>
      body {font-family: monospace; color: white;}
      pre {overflow: auto; padding: 1rem;}
      body,
      pre {background: #000000;}
    </style>
</head>
<body>
  <pre id="date"></pre>
  <pre id="result"></pre>

<script>
  
const apiKey = "AAPTaVbAyuOtFtPJiQA1zd6Ty-g..MMnyYh-AN6SOlySY0jbAzeYDnqiMjuSP_uHaenpvq7oKdA5N2WX8x8MmqMUcXjJZEW519zfIejS-yQGnZowFf1YiixWnwD_zahdrB1N-MpaSAY8VCcYtb0FP0NH-uKIjdMGthu_se9Z41J_rhxsCMpe2nHRMBeUAJvTDFO8bcS3AtQUjk0knm2gWE0bwyANHbAo4Tzcix49Cq2zJ-wCeILHr9aTiQSlo3T9O7t4r3JyFoFMd2_uKwg..AT1_plKwfIsc";


var strFullAddress = "500 7th Ave, New York, NY 10018";

	
// async function so that we can use "await"
async function geocodeAddress(restUrl) {
	
  // prep the fetch call
  var fetchOptions = {
                      method: 'GET',
                     };
  
  // use "fetch()" to make the REST call
  const response = await fetch(restUrl, fetchOptions);
  const jsonData = await response.json();

  // nicely format and draw the result to the page
  const now = new Date();
  document.getElementById("date").textContent = now;
  document.getElementById("result").textContent = JSON.stringify(jsonData, null, 2);
}


// build the REST GET request URL
var url = "https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates" +
          "?SingleLine=" + strFullAddress + 
          "&token=" + apiKey + 
          "&f=json";
		
// encode the URL
url = encodeURI(url);
	
// call the async function to make the REST request
geocodeAddress(url);
	
</script>
  
</body>

</html>
